<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kirana List Mobile updated</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f5f7fa; }
.completed { text-decoration: line-through; color: gray; }
</style>
</head>

<body>

<div class="container mt-5">
  <div class="card p-4 shadow">
    <h3 class="text-center">🛒 Kirana List (Mobile Voice)</h3>

    <div class="input-group mt-3">
      <input type="text" id="input" class="form-control" placeholder="Tap mic & speak...">
      <button onclick="addItem()" class="btn btn-success">Add</button>
    </div>

    <ul id="list" class="list-group mt-3"></ul>
  </div>
</div>

<script>
function addItem() {
  let input = document.getElementById("input");
  let text = input.value.trim();

  if(text === "") return;

  let li = document.createElement("li");
  li.className = "list-group-item d-flex justify-content-between";

  li.innerHTML = `
    <div>
      <input type="checkbox" onclick="this.nextElementSibling.classList.toggle('completed')">
      <span>${text}</span>
    </div>
    <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">Delete</button>
  `;

  document.getElementById("list").appendChild(li);
  input.value = "";
}
</script>

</body>
</html>
