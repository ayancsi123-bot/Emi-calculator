<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voice Kirana List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f5f7fa; }
.completed { text-decoration: line-through; color: gray; }
</style>
</head>

<body>

<div class="container mt-4">
  <div class="card p-3 shadow">
    <h4 class="text-center">🛒 Voice Kirana List</h4>

    <div class="text-center mt-2">
      <button id="start" class="btn btn-success">🎤 Start</button>
      <button id="stop" class="btn btn-danger">Stop</button>
    </div>

    <p id="status" class="text-center mt-2">Tap Start</p>

    <ul id="list" class="list-group mt-3"></ul>
  </div>
</div>

<script>
const startBtn = document.getElementById("start");
const stopBtn = document.getElementById("stop");
const list = document.getElementById("list");
const status = document.getElementById("status");

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  alert("❌ Not supported in this browser");
}

const recognition = new SpeechRecognition();
recognition.lang = "en-IN";
recognition.continuous = false; // IMPORTANT for mobile
recognition.interimResults = false;

let running = false;

// START
startBtn.onclick = async () => {
  try {
    await navigator.mediaDevices.getUserMedia({ audio: true });
    running = true;
    recognition.start();
    status.innerText = "🎤 Listening...";
  } catch {
    status.innerText = "❌ Permission denied";
  }
};

// STOP
stopBtn.onclick = () => {
  running = false;
  recognition.stop();
  status.innerText = "Stopped";
};

// RESULT
recognition.onresult = (event) => {
  let text = event.results[0][0].transcript.trim();
  if (text) addItem(text);
};

// AUTO LOOP (mobile fix 🔥)
recognition.onend = () => {
  if (running) {
    setTimeout(() => {
      try {
        recognition.start();
      } catch(e){}
    }, 800); // delay important for mobile
  }
};

// ADD ITEM
function addItem(text) {
  let li = document.createElement("li");
  li.className = "list-group-item d-flex justify-content-between";

  li.innerHTML = `
    <div>
      <input type="checkbox" onclick="this.nextElementSibling.classList.toggle('completed')">
      <span>${text}</span>
    </div>
    <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">Delete</button>
  `;

  list.appendChild(li);
}
</script>

</body>
</html>
